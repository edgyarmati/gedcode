<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="227"/>
    </clipPath>

    <linearGradient id="bgGrad" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d2d31"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>

    <radialGradient id="bgShine" cx="0.5" cy="0.18" r="0.65" fx="0.5" fy="0.12">
      <stop offset="0%" stop-color="#3e3e44" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a1a1c" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="250" y1="180" x2="750" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7e5a8"/>
      <stop offset="18%" stop-color="#e4ca6e"/>
      <stop offset="45%" stop-color="#c9a23e"/>
      <stop offset="72%" stop-color="#a88020"/>
      <stop offset="100%" stop-color="#7a5a12"/>
    </linearGradient>

    <linearGradient id="goldHL" x1="512" y1="150" x2="512" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffae6" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#f0d48a" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="orange" x1="380" y1="280" x2="680" y2="750" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5963e"/>
      <stop offset="35%" stop-color="#d65d0e"/>
      <stop offset="100%" stop-color="#8e3806"/>
    </linearGradient>

    <linearGradient id="orangeHL" x1="512" y1="300" x2="512" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffbb66" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#e87a2a" stop-opacity="0"/>
    </linearGradient>

    <filter id="gShadow" x="-20%" y="-15%" width="140%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <filter id="innerShadow" x="-20%" y="-15%" width="140%" height="145%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect width="1024" height="1024" fill="url(#bgShine)"/>

    <!-- Outer G (gold) with drop shadow -->
    <g filter="url(#gShadow)">
      <path d="M670 244 C618 207 553 186 486 188 C310 193 170 339 176 515 C181 691 327 831 503 826 C634 822 746 740 793 625"
        stroke="url(#gold)" stroke-width="108" stroke-linecap="round" fill="none"/>
      <path d="M594 512 H808"
        stroke="url(#gold)" stroke-width="108" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Gold bevel highlight -->
    <path d="M670 244 C618 207 553 186 486 188 C310 193 170 339 176 515 C181 691 327 831 503 826 C634 822 746 740 793 625"
      stroke="url(#goldHL)" stroke-width="108" stroke-linecap="round" fill="none"/>
    <path d="M594 512 H808"
      stroke="url(#goldHL)" stroke-width="108" stroke-linecap="round" fill="none"/>

    <!-- Inner G (orange) with shadow -->
    <g filter="url(#innerShadow)">
      <path d="M635 354 C599 328 555 314 509 316 C400 320 315 411 319 520 C323 629 414 714 523 710 C576 708 624 686 659 652"
        stroke="url(#orange)" stroke-width="76" stroke-linecap="round" fill="none"/>
      <path d="M594 512 H717"
        stroke="url(#orange)" stroke-width="76" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Orange bevel highlight -->
    <path d="M635 354 C599 328 555 314 509 316 C400 320 315 411 319 520 C323 629 414 714 523 710 C576 708 624 686 659 652"
      stroke="url(#orangeHL)" stroke-width="76" stroke-linecap="round" fill="none"/>
    <path d="M594 512 H717"
      stroke="url(#orangeHL)" stroke-width="76" stroke-linecap="round" fill="none"/>

    <!-- Subtle border highlight on squircle edge -->
    <rect x="1.5" y="1.5" width="1021" height="1021" rx="226" fill="none"
      stroke="white" stroke-width="1" opacity="0.08"/>
  </g>
</svg>
