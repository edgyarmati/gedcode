<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const THEME_STORAGE_KEY = "t3code:theme:v2";
        const LEGACY_THEME_STORAGE_KEY = "t3code:theme";
        const THEMES = new Set([
          "system",
          "light",
          "dark",
          "gruvbox-light",
          "gruvbox-dark",
          "midnight",
          "dracula",
        ]);
        const LEGACY_THEME_MAP = {
          light: "gruvbox-light",
          dark: "gruvbox-dark",
          system: "system",
        };
        const THEME_BACKGROUND = {
          light: "#f8fafc",
          dark: "#0f172a",
          "gruvbox-light": "#fbf1c7",
          "gruvbox-dark": "#282828",
          midnight: "#050816",
          dracula: "#282a36",
        };
        const DARK_THEMES = new Set(["dark", "gruvbox-dark", "midnight", "dracula"]);
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        const readTheme = () => {
          const storedTheme = window.localStorage.getItem(THEME_STORAGE_KEY);
          if (THEMES.has(storedTheme)) return storedTheme;
          return (
            LEGACY_THEME_MAP[window.localStorage.getItem(LEGACY_THEME_STORAGE_KEY)] ?? "system"
          );
        };
        try {
          const theme = readTheme();
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const concreteTheme = theme === "system" ? (prefersDark ? "dark" : "light") : theme;
          const isDark = DARK_THEMES.has(concreteTheme);
          document.documentElement.dataset.theme = concreteTheme;
          document.documentElement.classList.toggle("dark", isDark);
          const chromeColor = THEME_BACKGROUND[concreteTheme] ?? THEME_BACKGROUND.light;
          document.documentElement.style.backgroundColor = chromeColor;
          document.documentElement.style.setProperty("--boot-background", chromeColor);
          document.documentElement.style.setProperty(
            "--boot-foreground",
            isDark ? "#e2e8f0" : "#0f172a",
          );
          themeColorMeta?.setAttribute("content", chromeColor);
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = THEME_BACKGROUND.dark;
          document.documentElement.style.setProperty("--boot-background", THEME_BACKGROUND.dark);
          document.documentElement.style.setProperty("--boot-foreground", "#e2e8f0");
          themeColorMeta?.setAttribute("content", THEME_BACKGROUND.dark);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--boot-background, #f8fafc);
        color: var(--boot-foreground, #0f172a);
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        background: var(--boot-background, #0f172a);
        color: var(--boot-foreground, #e2e8f0);
      }

      #boot-shell {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
      }

      #boot-shell-card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
      }

      #boot-shell-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap"
      rel="stylesheet"
    />
    <title>GedCode</title>
  </head>
  <body>
    <div id="root">
      <div id="boot-shell">
        <div id="boot-shell-card" aria-label="GedCode splash screen">
          <img id="boot-shell-logo" src="/apple-touch-icon.png" alt="GedCode" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
